  <script type="text/javascript">
    var version = detectIE();
    if (version && version < 10) {
      location.reload(true);
    }

    function detectIE() {
      var ua = window.navigator.userAgent;
      var msie = ua.indexOf('MSIE ');
      if (msie > 0) {
        return parseInt(ua.substring(msie + 5, ua.indexOf('.', msie)), 10);
      }
      var trident = ua.indexOf('Trident/');
      if (trident > 0) {
        var rv = ua.indexOf('rv:');
        return parseInt(ua.substring(rv + 3, ua.indexOf('.', rv)), 10);
      }

      var edge = ua.indexOf('Edge/');
      if (edge > 0) {
        return parseInt(ua.substring(edge + 5, ua.indexOf('.', edge)), 10);
      }

      return false;
    }

  </script>
  <script type="text/javascript">
    function getParameterByName(name, url) {
      if (!url) url = window.location.href;
      name = name.replace(/[\[\]]/g, "\\$&");
      var regex = new RegExp("[?&]" + name + "(=([^&#]*)|&|#|$)"),
        results = regex.exec(url);
      if (!results) return null;
      if (!results[2]) return '';
      return decodeURIComponent(results[2].replace(/\+/g, " "));
    }

    if (!getParameterByName('auth') && window.location.hash ? window.location.hash.indexOf("#/manifest") > -1 : false) {
      window.location.href = "user.html?redirect=" + encodeURIComponent(location.href);
    }

    function setStyles() {
      if (window.self == window.top) {
        document.getElementsByClassName('prodeploy_client')[0].style.overflow = 'auto';
        document.getElementsByClassName('pdc_ctm_main')[0].style.cssText = '';
        document.getElementsByClassName('pdc_ctm_main')[0].style.overflow = 'auto !important';
      }
    }

  </script>
