.messages-box {
	display: -webkit-box;display: -ms-flexbox;display: flex;
}
.messages-box .box {
	width: 50%;
}
.messages-box .box .wrapper-box {
	text-align: center;
	background: #000;
	position: relative;
	border-radius: 4px;
	overflow: hidden;
	transition: all 0.3s;
}
.messages-box .box .wrapper-box:hover {
	box-shadow: 0 15px 15px 0 rgba(0,0,0,0.15);
}
.messages-box .box .wrapper-box:before {
	position: absolute;
	left: 0;
	bottom: 0;
	right: 0;
	top: 0;
	background-image: linear-gradient(180deg, rgba(0,0,0,0.00) 57%, #000000 83%);
}
.messages-box .box .wrapper-box h2 {
	color: #fff;
	position: absolute;
	left: 15px;
	right: 15px;
	bottom: 30px;
	font-size: 18px;
	color: #FFFFFF;
	letter-spacing: 0;
	text-align: center;
	line-height: 22px;
}
.messages-box .box .wrapper-box h2 a {
	color: inherit;
	font-size: inherit;
	font-weight: inherit;
}
.messages-box .box:first-child .wrapper-box {
	margin-right: 11px;
}
.messages-box .box:last-child .wrapper-box {
	margin-left: 11px;
}

@media(max-width: 767px) {

		display: block;
	}

		width: 100%;

	}

		margin-bottom: 0;
	}
	.messages-box .box:first-child .wrapper-box {
		margin-right: 0;
	}
	.messages-box .box:last-child .wrapper-box {
		margin-left: 0;
	}

		bottom: 15px;
	}
}
