    <script>
      Dell = window.Dell || {};
      Dell.Metrics = Dell.Metrics || {};
      Dell.Metrics.sc = Dell.Metrics.sc || {};
      Dell.Metrics.sc.country = 'US';
      Dell.Metrics.sc.language = 'en-US';
      Dell.Metrics.sc.segment = 'corp';
      Dell.Metrics.sc.customerset = '';
      Dell.Metrics.sc.cms = 'ddh';
      Dell.Metrics.sc.applicationname = 'Dell Developer Hub';
      Dell.Metrics.sc.pagename = 'us|en|corp|ddh';
      Dell.Metrics.sc.badgeid = '';

      document.addEventListener(
        'updateDellMetrics',
        function (event) {
          for (var key in event.properties) {
            if (properties.hasOwnProperty(key)) {
              Dell.Metrics.sc[key] = event.properties[key];
            }
          }
        },
        false
      );
    </script>
