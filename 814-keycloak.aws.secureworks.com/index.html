    <meta name="robots" content="noindex, nofollow">

<div style="
    position: fixed;
    top: 0;

    color: #e0e0ff;
    font-family: Arial, sans-serif;
    font-size: 16px;
    font-weight: bold;

">
    🔍 Preview of <span style="color:#7eb3ff;">keycloak.aws.secureworks.com</span>
</div>
<div style="height: 48px;"></div>

<div class="login-pf-page">
    <div id="kc-header" class="login-pf-page-header">
        <div id="kc-header-wrapper"
             class=""><div class="kc-logo-text"><span>Keycloak</span></div></div>
    </div>
    <div class="card-pf">
        <header class="login-pf-header">
                <h1 id="kc-page-title">        Sign in to your account

</h1>
      </header>
      <div id="kc-content">
        <div id="kc-content-wrapper">


    <div id="kc-form">
      <div id="kc-form-wrapper">
            <form id="kc-form-login" onsubmit="login.disabled = true; return true;" action="https://keycloak.aws.secureworks.com/auth/realms/Voltron/login-actions/authenticate?session_code=70b1Ss1QQu_dQ2JLtYFKGGdpCTtODyi2BxZsjEnrhPc&amp;execution=412a2779-f98d-4909-a5eb-c49adf99b47b&amp;client_id=rundeck-prod&amp;tab_id=4QFCk2gGMj8" method="post">
                    <div class="form-group">
                        <label for="username" class="control-label">Username or email</label>

                        <input tabindex="1" id="username" class="form-control" name="username" value=""  type="text" autofocus autocomplete="off"
                               aria-invalid=""
                        />


                    </div>

                <div class="form-group">
                    <label for="password" class="control-label">Password</label>

                    <input tabindex="2" id="password" class="form-control" name="password" type="password" autocomplete="off"
                           aria-invalid=""
                    />


                </div>

                <div class="form-group login-pf-settings">
                    <div id="kc-form-options">
                        </div>
                        <div class="">
                        </div>

                  </div>

                  <div id="kc-form-buttons" class="form-group">
                      <input type="hidden" id="id-hidden-input" name="credentialId" />
                      <input tabindex="4" class="btn btn-primary btn-block btn-lg" name="login" id="kc-login" type="submit" value="Sign In"/>
                  </div>
            </form>
        </div>

    </div>





        </div>
      </div>

    </div>
