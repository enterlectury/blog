                    var raw = localStorage.getItem(PROBE_STATE_KEY);
                    if (!raw) return null;
                    var state = JSON.parse(raw);
                    if (Date.now() - state.startedAt > PROBE_STATE_TTL_MS) {
                        clearProbeState();
                        return null;
                    }
                    return state;
                } catch (e) {
                    return null;
                }
            }

            function setProbeState() {
                try {
                    localStorage.setItem(PROBE_STATE_KEY, JSON.stringify({
                        startedAt: Date.now(),
                        idpId: idpId
                    }));
                } catch (e) {}
            }

            function clearProbeState() {
                try { localStorage.removeItem(PROBE_STATE_KEY); } catch (e) {}
            }

            // == UI HELPERS =================================================================
            function removeNotificationContainer() {
                var el = document.getElementById('notification-container');
                if (el) el.innerHTML = '';
            }

            function my_renderWidget(stateToken) {
                if (widgetRendering) return;
                widgetRendering = true;
                removeNotificationContainer();

                var opts = { el: '#okta-login-container' };
                if (stateToken) opts.stateToken = stateToken;

                oktaSignIn.renderEl(opts, OktaUtil.completeLogin, function(error) {
                    console.log(error.message, error);
                    // update the notification-container-message with error message
                    var msgEl = document.getElementById('notification-container-message');
                    if (msgEl) msgEl.textContent = error.message;
                });
            }

            // == IDP PROBE ==================================================================
            function initiateIdpProbe() { // Moved from iframe to redirect method
                var probeUrl = locationOrigin + '/sso/idps/' + idpId;
                console.log('Initiating IdP probe via redirect to:', probeUrl);

                var form = document.createElement('form');
                form.method = 'POST';
                form.action = probeUrl;
                var input = document.createElement('input');
                input.type = 'hidden';
                input.name = 'stateToken';
                input.value = original_stateToken;
                form.appendChild(input);

                document.body.appendChild(form);
                form.submit();
            }

            // == DSSO CHECK =================================================================
            function checkDsso() {
                var isDssoFlow = window.location.href.indexOf('agentlessDsso/auth') !== -1 ||
                                 window.location.href.indexOf('login/agentlessDsso/idx') !== -1;

                debugLog('checkDsso() called', { url: window.location.href, isDssoFlow: isDssoFlow });

                if (!isDssoFlow) return Promise.resolve({ handled: false });

                console.log('DSSO flow detected, introspecting stateToken...');
                debugLog('stateToken for introspection', original_stateToken);

                return oktaSignIn.authClient.idx.introspect({ stateHandle: original_stateToken })
                    .then(function(result) {
                        var rawIdxState = result.rawIdxState;
                        debugLog('rawIdxState', rawIdxState);

                        // Case 1: DSSO fully successful - rawIdxState.success exists
                        if (rawIdxState && rawIdxState.success) {
                            console.log('DSSO successful (rawIdxState.success), render widget directly.');
                            debugLog('rawIdxState.success', rawIdxState.success);
                            my_renderWidget(original_stateToken);
                            return { handled: true };
                        }

                        // Case 2: Check remediation to determine if user was identified
                        if (rawIdxState && rawIdxState.remediation && rawIdxState.remediation.value && rawIdxState.remediation.value.length > 0) {
                            var firstRemediationName = rawIdxState.remediation.value[0].name;
                            console.log('DSSO remediation name:', firstRemediationName);
                            debugLog('All remediations', rawIdxState.remediation.value.map(function(r) { return r.name; }));

                            // If remediation is "identify", DSSO failed - user not identified, probe IdP
                            if (firstRemediationName === 'identify') {
                                console.log('DSSO failed (remediation=identify), will probe IdP.');
                                debugLog('User not identified, IdP probe required');
                                return { handled: false };
                            }

                            // Any other remediation (e.g., challenge-authenticator, select-authenticator-authenticate)
                            // means DSSO succeeded in identifying user & verified PW, but more steps needed (like MFA)
                            console.log('DSSO partially successful (user identified, remediation=' + firstRemediationName + '), render widget directly.');
                            debugLog('User identified via DSSO', rawIdxState.user);
                            my_renderWidget(original_stateToken);
                            return { handled: true };
                        }

                        // Fallback: no success and no remediation - probe IdP
                        console.log('DSSO state unclear, will probe IdP.');
                        debugLog('No success and no remediation found');
                        return { handled: false };
                    })
                    .catch(function(error) {
                        console.error('DSSO introspection failed:', error);
                        debugLog('Introspection error details', { message: error.message, stack: error.stack });
                        return { handled: false };
                    });
            }

            // == URL CONDITIONS =============================================================
            var saml2FlowRegex = new RegExp('^' + locationOrigin.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '/sso/saml2/[^/]+/?$');
            var tokensVerifyRegex = new RegExp('^' + locationOrigin.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '/tokens/[^/]+/verify/?$');
            var isOrg2Org = new RegExp('^' + locationOrigin.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '/app/okta_org2org/[^/]+/sso/saml/?$');

            var passThroughConditions = [
                tokensVerifyRegex.test(window.location.href),
                window.location.href.indexOf('/reset_password/') !== -1,
                window.location.href.indexOf('/activate') !== -1,
                saml2FlowRegex.test(window.location.href), 
                isOrg2Org.test(window.location.href)
            ];

            // == MAIN =======================================================================
            function main() {
                console.log('=== Flow Started ===');
                debugLog('Configuration', {
                    idpId: idpId,
                    probeIdpEnabled: probeIdpEnabled,
                    advancedDebugEnabled: advancedDebugEnabled,
                    codeVersion: codeVersion,
                    url: window.location.href
                });
                debugLog('stateToken', original_stateToken);


                // log app info
                // console.log('getApp():', getApp());

                // Check for existing session, skip probe if found, and render widget directly
                return oktaSignIn.authClient.session.exists()
                    .then(function(sessionExists) {
                        debugLog('Session check result', sessionExists);
                        if (sessionExists) {
                            console.log('Active session exists.');
                            clearProbeState();
                            my_renderWidget();
                            return;
                        }
                        return continueAfterSessionCheck();
                    })
                    .catch(function(e) {
                        debugLog('Session check error', e.message);
                        return continueAfterSessionCheck();
                    });
            }

            function continueAfterSessionCheck() {
                // Pass-through conditions, render widget directly
                debugLog('Pass-through conditions', passThroughConditions);
                if (passThroughConditions.some(Boolean)) {
                    console.log('Pass-through condition, render widget directly.');
                    my_renderWidget(original_stateToken);
                    return;
                }

                var probeState = getProbeState();
                var isCallback = window.location.href.indexOf('/callback') !== -1;
                debugLog('Flow state', { probeState: probeState, isCallback: isCallback });

                // Returning from probe, render widget directly
                if (isCallback && probeState) {
                    console.log('Returning from IdP probe, render widget directly.');
                    clearProbeState();
                    my_renderWidget(original_stateToken);
                    return;
                }

                // External callback (not from our probe)
                if (isCallback && !probeState) {
                    console.log('External callback, render widget directly.');
                    my_renderWidget();
                    return;
                }

                // Already probed (page reload)
                if (probeState) {
                    console.log('Already probed, render widget directly.');
                    clearProbeState();
                    my_renderWidget(original_stateToken);
                    return;
                }

                // Prisma Browser Check
                // var isPrismaBrowser = window.navigator.userAgent.indexOf('Prisma') !== -1;
                // debugLog('Prisma browser check', { isPrismaBrowser: isPrismaBrowser });

                // if (isPrismaBrowser) {
                //    console.log('Prisma browser detected, skipping probe and rendering widget.');
                //    my_renderWidget(original_stateToken);
                //    return;
                //}


                // Skip for Specific Applications (CSC and Prisma) based on app ID
                var currentApp = getApp();
                var currentAppId = (currentApp && currentApp !== 'unknown' && currentApp.id) ? currentApp.id : null;
                if (skipProbeClientIds.length > 0 && currentAppId) {
                    var isSkippedClient = skipProbeClientIds.indexOf(currentAppId) !== -1;
                    debugLog('App ID skip check', { appId: currentAppId, isSkippedClient: isSkippedClient });
                    if (isSkippedClient) {
                        console.log('App ID in skip list, skipping probe and rendering widget.');
                        my_renderWidget(original_stateToken);
                        return;
                    }
                }

                // Check DSSO flow
                return checkDsso().then(function(dssoResult) {
                    debugLog('DSSO check result', dssoResult);
                    if (dssoResult.handled) return;

                    // Initiate probe
                    if (probeIdpEnabled) {
                        console.log('Initiating IdP probe...');
                        debugLog('Probe will redirect to', locationOrigin + '/sso/idps/' + idpId);
                        setProbeState();
                        initiateIdpProbe();
                        return;
                    }

                    debugLog('IdP probing disabled, rendering widget directly');
                    my_renderWidget(original_stateToken);
                });
            }

            // == START ======================================================================
            main().catch(function(error) {
                console.error('Main flow error:', error);
                my_renderWidget(original_stateToken);
            });

        </script>
    </body>
</html>
