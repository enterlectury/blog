<html lang="en">
<head>
  <base href="https://docs.ctpx.secureworks.com/">
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redirecting...</title>

<script type="text/javascript">
// Desired base URL of the new documentation site
const newBaseUrl = 'https://docs.taegis.secureworks.com';

// This function extracts the path from the current URL and redirects to the new site
function redirectToNewSite() {
const currentPath = window.location.pathname;

// Construct the new URL
const newUrl = newBaseUrl + currentPath;

// Redirect to the new URL
window.location.replace(newUrl);

}

// Run the redirection when the page loads
window.onload = redirectToNewSite;

</script>
</head>

<body>
<div style="
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 999999;
    background: #1a1a2e;
    color: #e0e0ff;
    font-family: Arial, sans-serif;
    font-size: 16px;
    font-weight: bold;
    padding: 10px 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    text-align: center;
">
    🔍 Preview of <span style="color:#7eb3ff;">docs.ctpx.secureworks.com</span>
</div>
<div style="height: 48px;"></div>

<h1>Redirecting to the new site...</h1>
<p>If you are not redirected automatically, <a id="redirectLink" href="#">click here</a>.</p>

<script>
// Set the link href dynamically in case automatic redirect fails
document.getElementById('redirectLink').href = newBaseUrl + window.location.pathname;
</script>

</body>
</html>
